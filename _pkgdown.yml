
template:
  bootstrap: 5

url: https://BIMSBbioinfo.github.io/cacheR

home:
  title: cacheR
  description: "Simple function-level caching for R workflows."

navbar:
  structure:
    left:  [home, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/BIMSBbioinfo/cacheR

articles:
  - title: Getting started
    contents:
      - cacheR-introduction

  - title: RNA-seq workflow example
    contents:
      - cacheR-rnaseq

  - title: Machine learning example
    contents:
      - cacheR-machine_learning

reference:
  - title: "User functions"
    contents:
      - starts_with("cache")
      - plot_cache_graph
      - track_file
      - export_targets_file
  - title: "Decorator"
    contents:
      - decorator
      - "%@%"
      - prettify
      - pretty_code
  - title: "Internals"
    contents:
      - starts_with(".")
