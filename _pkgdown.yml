template:
  bootstrap: 5
  bslib:
    base_font_size: 0.9rem
    font_size_base: 0.9
    code-font-size: 0.85rem

url: https://BIMSBbioinfo.github.io/cacheR

home:
  title: cacheR
  description: "Simple function-level caching for R workflows."

navbar:
  structure:
    left:  [home, reference, intro, rnaseq, ml]
    right: [github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    intro:
      text: Introduction
      href: articles/cacheR-introduction.html
    rnaseq:
      text: RNA-seq
      href: articles/cacheR-rnaseq.html
    ml:
      text: Machine Learning
      href: articles/cacheR-machine_learning.html
    github:
      icon: fab fa-github
      href: https://github.com/BIMSBbioinfo/cacheR
      aria-label: GitHub repository

articles:
  - title: Getting started
    contents:
      - cacheR-introduction

  - title: RNA-seq workflow example
    contents:
      - cacheR-rnaseq

  - title: Machine learning example
    contents:
      - cacheR-machine_learning

reference:
  - title: "User functions"
    contents:
      - starts_with("cache")
      - plot_cache_graph
      - track_file
      - export_targets_file
  - title: "Decorator"
    contents:
      - decorator
      - "%@%"
      - prettify
      - pretty_code
  - title: "Internals"
    contents:
      - starts_with(".")
